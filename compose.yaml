services:

  
  db:
    image: postgis/postgis:16-master
    container_name: petradar-db
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petradar_db
    ports:
      - "5433:5432"
    volumes:
      - petradar_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: pet-radar-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - petradar_redis_data:/data

volumes:
  petradar_data:
  petradar_redis_data: